<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Betting Dashboard</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <!-- Your custom JS -->
    <script src="app.js" defer></script>

    <style>
        body { font-family: Arial; padding: 20px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 250px; }
        button { margin-right: 10px; padding: 8px 12px; margin-bottom: 10px; }
        #balance { font-weight: bold; margin-bottom: 20px; }
        .match { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .match h3 { margin: 0 0 10px 0; }
    </style>
</head>
<body>

    <h1>Virtual Betting Demo</h1>

    <!-- Login/Register -->
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <p id="balance">Coins: 0</p>

    <!-- Betting Dashboard -->
    <div id="dashboard" style="display:none;">
        <h2>Matches to Bet On</h2>
        <div id="matches"></div>
    </div>

</body>
</html>
