
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Betting 833</title>

    <!-- Firebase SDKs (v8 style) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <!-- Your JS -->
    <script src="app.js" defer></script>

    <style>
        body { font-family: Arial; padding: 20px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 250px; }
        button { margin-right: 10px; padding: 8px 12px; margin-bottom: 10px; }
        #balance { font-weight: bold; margin-bottom: 20px; }
        .match { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .match h3 { margin: 0 0 10px 0; }
        #leaderboard { margin-top: 30px; border-top: 2px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <h1>Virtual Betting Demo</h1>

    <!-- Login/Register -->
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <p id="balance">Coins: 0</p>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none;">
        <h2>Matches to Bet On</h2>
        <div id="matches"></div>

        <h2>Leaderboard</h2>
        <div id="leaderboard"></div>

        <div id="admin"></div>
    </div>

</body>
</html>
